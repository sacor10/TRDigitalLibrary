[build]
  # Production builds run the ingest orchestrator before the TypeScript / Vite
  # build. The orchestrator (scripts/run-build-ingest.mjs) is env-gated:
  #   - If TURSO_LIBRARY_DATABASE_URL is set, run ingest-loc + ingest-tei
  #     against the configured Turso DB (idempotent — a no-op rebuild
  #     finishes in seconds).
  #   - If any new/updated rows were written, or if existing documents are
  #     missing sentiment rows, run python/sentiment.py to keep the
  #     precomputed sentiment table in sync. A no-op ingest with complete
  #     sentiment coverage skips the Python pass (fast path).
  #   - If TURSO_LIBRARY_DATABASE_URL is not set, log a warning and exit 0
  #     so PR previews / forks without the Turso secrets do not fail the
  #     build.
  # Required Netlify environment variables for production:
  #   - TURSO_LIBRARY_DATABASE_URL  (libsql:// URL of the library DB)
  #   - TURSO_LIBRARY_AUTH_TOKEN    (Turso auth token, secret)
  command = "npm ci && npm run ingest && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  PIP_CACHE_DIR = "/opt/build/cache/pip"

# Persist the pip cache between builds. Netlify's automatic cache only
# covers a small allow-list of paths (npm, yarn, etc.); for arbitrary paths
# we use netlify-plugin-cache, declared as a devDependency at the repo root
# and resolved from local node_modules at build time.
[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "/opt/build/cache/pip",
    ]

[functions]
  node_bundler = "esbuild"

[functions."api"]
  # Library data lives in Turso (TURSO_LIBRARY_DATABASE_URL); we no longer
  # bundle data/library.db with the function. Migration SQL files are still
  # bundled so openLibraryDb / openAnnotationsDb can apply pending migrations
  # on cold start against an upstream Turso DB that pre-dates a new schema.
  included_files = [
    "server/src/migrations/*.sql",
    "server/src/annotations-migrations/*.sql",
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for the SPA. CSP intentionally does NOT include
# 'unsafe-eval' so that any stray eval() / new Function() call surfaces
# loudly rather than silently working. style-src needs 'unsafe-inline'
# for Tailwind / React inline styles; img-src needs data: and blob: for
# OpenSeadragon tile rendering.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; img-src 'self' data: blob: https://*.googleusercontent.com https://upload.wikimedia.org https://cdn.jsdelivr.net https://*.loc.gov https://iiif.archive.org https://*.archive.org; connect-src 'self' https://accounts.google.com/gsi/ https://*.loc.gov https://iiif.archive.org https://archive.org https://*.archive.org https://upload.wikimedia.org; frame-src https://accounts.google.com/gsi/; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
