[build]
  # Production builds run the ingest orchestrator before the TypeScript / Vite
  # build. The orchestrator (scripts/run-build-ingest.mjs) is env-gated:
  #   - If TURSO_LIBRARY_DATABASE_URL is set, run ingest-loc + ingest-tei
  #     against the configured Turso DB (idempotent — a no-op rebuild
  #     finishes in seconds).
  #   - If any new/updated rows were written, also run python/sentiment.py
  #     and python/topic_model.py to keep the precomputed analytics tables
  #     in sync. A no-op ingest skips the Python pass entirely (fast path).
  #   - If TURSO_LIBRARY_DATABASE_URL is not set, log a warning and exit 0
  #     so PR previews / forks without the Turso secrets do not fail the
  #     build.
  # Required Netlify environment variables for production:
  #   - TURSO_LIBRARY_DATABASE_URL  (libsql:// URL of the library DB)
  #   - TURSO_LIBRARY_AUTH_TOKEN    (Turso auth token, secret)
  command = "npm ci && npm run ingest && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  # Python sidecars (sentiment + topic-model) only run when ingest reports
  # new/updated rows. The first cold build pulls ~500 MB of HuggingFace
  # weights for sentence-transformers/all-MiniLM-L6-v2 and a similar amount
  # of pip wheels (torch, scikit-learn, bertopic). Pinning the cache dirs
  # under /opt/build/cache (Netlify's persistent build-cache mount) lets the
  # netlify-plugin-cache plugin below restore them on the next build, so
  # subsequent builds that DO trigger analysis finish in a few minutes
  # instead of 15+.
  PIP_CACHE_DIR = "/opt/build/cache/pip"
  HF_HOME = "/opt/build/cache/huggingface"
  TRANSFORMERS_CACHE = "/opt/build/cache/huggingface/transformers"
  SENTENCE_TRANSFORMERS_HOME = "/opt/build/cache/huggingface/sentence-transformers"
  # The canonical topic compute is the Python sidecar (python/topic_model.py)
  # that runs at build time and writes to Turso. Disable the JS fallback
  # auto-compute in the serverless function: with it off, the dynamic import
  # in server/src/db.ts never tries to resolve @huggingface/transformers at
  # runtime, which is required because we intentionally exclude that package
  # from the function bundle (see [functions].external_node_modules below
  # and server/src/topics/embed.ts).
  TR_TOPICS_AUTO_COMPUTE = "0"

# Persist the pip + HuggingFace caches between builds. Netlify's automatic
# cache only covers a small allow-list of paths (npm, yarn, etc.); for
# arbitrary paths we use netlify-plugin-cache, declared as a devDependency
# at the repo root and resolved from local node_modules at build time.
[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "/opt/build/cache/pip",
      "/opt/build/cache/huggingface",
    ]

[functions]
  node_bundler = "esbuild"
  # `@huggingface/transformers` is intentionally NOT listed in
  # external_node_modules: doing so would tell ZISI to ship the package as
  # a runtime node_module (~150 MB on disk) and blow the function size
  # limit. Instead, server/src/topics/embed.ts uses a variable-indirected
  # `await import('@huggingface/transformers')` that esbuild and
  # @vercel/nft both refuse to statically resolve, so the package is
  # excluded from the bundle entirely. TR_TOPICS_AUTO_COMPUTE=0 (set
  # above) keeps that code path from executing at runtime, which is what
  # we want because the package is not in the zip.

[functions."api"]
  # Library data lives in Turso (TURSO_LIBRARY_DATABASE_URL); we no longer
  # bundle data/library.db with the function. Migration SQL files are still
  # bundled so openLibraryDb / openAnnotationsDb can apply pending migrations
  # on cold start against an upstream Turso DB that pre-dates a new schema.
  included_files = [
    "server/src/migrations/*.sql",
    "server/src/annotations-migrations/*.sql",
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for the SPA. CSP intentionally does NOT include
# 'unsafe-eval' so that any stray eval() / new Function() call surfaces
# loudly rather than silently working. style-src needs 'unsafe-inline'
# for Tailwind / React inline styles; img-src needs data: and blob: for
# OpenSeadragon tile rendering.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; img-src 'self' data: blob: https://*.googleusercontent.com https://upload.wikimedia.org https://cdn.jsdelivr.net https://*.loc.gov https://iiif.archive.org https://*.archive.org; connect-src 'self' https://accounts.google.com/gsi/ https://*.loc.gov https://iiif.archive.org https://archive.org https://*.archive.org https://upload.wikimedia.org; frame-src https://accounts.google.com/gsi/; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
