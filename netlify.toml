[build]
  command = "npm ci && npm run seed && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["better-sqlite3"]

[functions."api"]
  included_files = ["data/library.db", "server/src/migrations/*.sql"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
